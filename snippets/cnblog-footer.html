<script>
var FRIENDS_JSON_URL = 'https://cdn.jsdelivr.net/gh/alphaRaWaY/alphaRaWaY.github.io@encoding/public/friends.json?v=20260416-1';
var FRIENDS_FALLBACK = [
  {
    name: 'alphaRaWaY',
    introduction: '即使那样，我依然生存着，在这广阔的世界。',
    url: 'https://www.cnblogs.com/alphaRaWaY/',
    headurl: 'https://cdn.jsdelivr.net/gh/alphaRaWaY/alphaRaWaY.github.io@encoding/public/img/avatar.png'
  },
  {
    name: 'Luckyblock',
    introduction: '有记日记的功夫还不如在走廊睡上一觉。',
    url: 'https://www.cnblogs.com/luckyblock',
    headurl: 'https://pic1.imgdb.cn/item/69df7a6cdea40c4b8074766e.png'
  }
];

function normalizeFriends(list) {
  if (!Array.isArray(list)) return FRIENDS_FALLBACK;
  return list
    .filter(function (item) {
      return item && item.name && item.url && item.headurl;
    })
    .map(function (item) {
      return {
        name: String(item.name),
        introduction: String(item.introduction || ''),
        url: String(item.url),
        headurl: String(item.headurl)
      };
    });
}

function initMiluFrame(friendList) {
  miluframe({
    Youself: 'https://www.cnblogs.com/alphaRaWaY/',
    custom: [
      { name: '首页', link: 'https://www.cnblogs.com/alphaRaWaY/', istarget: false },
      { name: '技能树', link: 'https://alpharaway.github.io/', istarget: true },
      { name: '友链', link: 'https://www.cnblogs.com/alphaRaWaY/p/19866343', istarget: false },
      { name: '联系', link: 'https://msg.cnblogs.com/send/alphaRaWaY', istarget: true },
      { name: 'GitHub', link: 'https://github.com/alphaRaWaY', istarget: true }
    ],
    resume: {
      name: 'alphaRaWaY',
      link: 'https://www.cnblogs.com/alphaRaWaY/',
      headurl: 'https://cdn.jsdelivr.net/gh/alphaRaWaY/alphaRaWaY.github.io@encoding/public/img/avatar.png',
      introduction: '那一天，与我期望的那个世界，稍微有些不同。'
    },
    unionbox: friendList,
    details: [
      { field: 'name', literal: '昵称' },
      { field: 'introduction', literal: '标语' },
      { field: 'url', literal: '链接地址' },
      { field: 'headurl', literal: '头像地址' }
    ],
    logoimg: 'https://cdn.jsdelivr.net/gh/alphaRaWaY/alphaRaWaY.github.io@encoding/public/img/avatar.png',
    isGratuity: false,
    gratuity: ''
  });
}

function enforceMyBlogLabel() {
  var tryFix = function () {
    var link = document.querySelector('#profile_block a');
    if (link) link.textContent = '\u6211\u7684\u535A\u5BA2';
  };
  tryFix();
  setTimeout(tryFix, 300);
  setTimeout(tryFix, 1200);
  setTimeout(tryFix, 2500);
}

fetch(FRIENDS_JSON_URL, { cache: 'no-store' })
  .then(function (res) {
    if (!res.ok) throw new Error('friends.json request failed');
    return res.json();
  })
  .then(function (list) {
    var normalized = normalizeFriends(list);
    initMiluFrame(normalized.length ? normalized : FRIENDS_FALLBACK);
    enforceMyBlogLabel();
  })
  .catch(function () {
    initMiluFrame(FRIENDS_FALLBACK);
    enforceMyBlogLabel();
  });
</script>

// Hard-fix: rebuild follow button to remove any broken text like "�?/span>".
(function forceCleanAttention() {
  var followId = '23b07152-44a3-4e31-9d8c-08dddb4fdd26';
  function rebuild() {
    var list = document.querySelectorAll('.attention');
    list.forEach(function (oldEl) {
      var clean = document.createElement('div');
      clean.className = 'attention';
      clean.id = 'cnb-follow-btn';
      clean.onclick = function () {
        if (typeof follow === 'function') follow(followId);
      };
      var label = document.createElement('span');
      label.textContent = '+加关注';
      clean.appendChild(label);
      oldEl.replaceWith(clean);
    });
  }
  rebuild();
  setTimeout(rebuild, 300);
  setTimeout(rebuild, 1200);
  setTimeout(rebuild, 2500);
})();
